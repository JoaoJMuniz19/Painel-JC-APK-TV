<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#071118"><title>Redefinir senha | JC-APK TV</title>
<style>
*{box-sizing:border-box}html{background:#071118}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;color:#fff;font-family:Arial,sans-serif;position:relative;isolation:isolate}body:before{content:"";position:fixed;inset:0;z-index:-2;background:url("assets/jc-apk-background.webp") center/cover no-repeat;filter:brightness(.35) saturate(1.08)}body:after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(120deg,rgba(2,8,14,.94),rgba(5,19,30,.78))}.card{width:min(560px,100%);padding:24px;border:1px solid rgba(255,255,255,.15);border-radius:24px;background:linear-gradient(145deg,rgba(15,31,40,.94),rgba(6,18,25,.9));box-shadow:0 30px 95px rgba(0,0,0,.55);backdrop-filter:blur(15px)}.brand{display:inline-flex;padding:7px 11px;border-radius:999px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:#6dffa4;font-weight:900;letter-spacing:.06em}h1{margin:12px 0 8px;font-size:clamp(28px,5vw,38px)}p{color:#aebbc3;line-height:1.55}label{display:block;font-size:13px;color:#cbd6dc;margin:12px 0 6px}input,button,a.btn{width:100%;padding:13px 14px;border-radius:12px;font:inherit}input{border:1px solid rgba(255,255,255,.15);background:rgba(10,27,35,.92);color:#fff;outline:none}input:focus{border-color:rgba(37,211,102,.72);box-shadow:0 0 0 3px rgba(37,211,102,.11)}button,a.btn{border:0;background:linear-gradient(135deg,#31e777,#12ad58);color:#042012;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;display:inline-block;margin-top:10px}.secondary{background:rgba(10,25,32,.74)!important;color:#baf5cf!important;border:1px solid rgba(37,211,102,.42)!important}.message{min-height:46px;margin-top:14px;padding:12px 13px;border-radius:12px;background:rgba(4,14,20,.5);border:1px solid rgba(255,255,255,.08);color:#baf5cf;line-height:1.5}.danger{color:#ffaaaa}.hidden{display:none}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:560px){.actions{grid-template-columns:1fr}.card{padding:20px}}
</style><link rel="stylesheet" href="dados/jc-responsive-backgrounds.css?v=20260621-07G">
</head><body data-jc-bg-mobile="general"><main class="card"><div class="brand">JC-APK TV</div><h1>Redefinir senha</h1>
<section id="requestView"><p>Digite o nome de usuário ou o e-mail cadastrado. Você receberá um link no e-mail para criar uma nova senha.</p><label for="identifier">Usuário ou e-mail</label><input id="identifier" autocomplete="username" placeholder="JoaoxxxxM ou Jxxxmxxx10xx@gmail.com"><button id="requestBtn" type="button">ENVIAR LINK DE REDEFINIÇÃO</button></section>
<section id="changeView" class="hidden"><p>Link confirmado. Crie sua nova senha do painel.</p><label for="newPassword">Nova senha</label><input id="newPassword" type="password" autocomplete="new-password" placeholder="Mínimo de 8 caracteres"><label for="confirmPassword">Confirmar nova senha</label><input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Digite novamente"><button id="saveBtn" type="button">SALVAR NOVA SENHA</button></section>
<div class="actions"><a class="btn secondary" href="teste-conexao.html">TESTAR CONEXÃO</a><a class="btn secondary" href="geradores/">VOLTAR AO LOGIN</a></div><div id="message" class="message">Aguardando seus dados.</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="dados/supabase-config.js"></script><script src="dados/common.js"></script>
<script>
(function(){'use strict';const A=window.JC_APP,$=id=>document.getElementById(id),msg=$('message'),requestView=$('requestView'),changeView=$('changeView');let recoveryReady=false;function show(t,err){msg.textContent=t;msg.className='message'+(err?' danger':'')}function recoveryUrl(){return String(A.cfg.recoveryUrl||new URL('redefinir-senha.html',location.href).href)}function openChange(){recoveryReady=true;requestView.classList.add('hidden');changeView.classList.remove('hidden');show('Link confirmado. Digite e confirme a nova senha.');setTimeout(()=>{try{history.replaceState(null,document.title,location.pathname)}catch(e){}},0)}
if(!A.ready||!A.client){show('O Supabase novo ainda não foi configurado em dados/supabase-config.js.',true);$('requestBtn').disabled=true;return}
A.client.auth.onAuthStateChange(function(event,session){if(event==='PASSWORD_RECOVERY'&&session)openChange()});
const expectsRecovery=/[?#&](type=recovery|access_token=|code=)/i.test(location.href);
if(expectsRecovery)setTimeout(async()=>{if(recoveryReady)return;const {data}=await A.client.auth.getSession();if(data?.session)openChange();else show('Este link expirou, já foi usado ou não foi aceito. Solicite um novo e-mail.',true)},1600);
$('requestBtn').onclick=async function(){const raw=$('identifier').value.trim();if(!raw)return show('Digite seu usuário ou e-mail.',true);this.disabled=true;show('Preparando o envio...');try{const email=await A.resolveEmail(raw);const {error}=await A.client.auth.resetPasswordForEmail(email,{redirectTo:recoveryUrl()});if(error)throw error;show('✅ Link enviado. Abra somente o e-mail mais recente e verifique também a pasta de spam.')}catch(e){show('❌ '+(e.message||e),true)}finally{this.disabled=false}};
$('saveBtn').onclick=async function(){const a=$('newPassword').value,b=$('confirmPassword').value;if(!recoveryReady)return show('O link de recuperação ainda não foi confirmado.',true);if(a.length<8)return show('A senha precisa ter pelo menos 8 caracteres.',true);if(a!==b)return show('As duas senhas não são iguais.',true);this.disabled=true;show('Salvando a nova senha...');try{const {error}=await A.client.auth.updateUser({password:a});if(error)throw error;await A.client.rpc('log_panel_password_change').catch(()=>null);await A.client.auth.signOut({scope:'local'});changeView.classList.add('hidden');show('✅ Senha atualizada. Você já pode voltar ao login e entrar com a nova senha.')}catch(e){show('❌ '+(e.message||e),true);this.disabled=false}};
})();
</script></body></html>
